name: Build Turklion Launcher (All Platforms)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild

      - name: Build Windows
        run: npx electron-builder --win --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: TurklionLauncher-Windows
          path: dist/*.exe
          retention-days: 30

  build-linux:
    name: Linux Build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y rpm fakeroot dpkg libarchive-tools \
            libx11-dev libxkbfile-dev libsecret-1-dev \
            python3 make g++ gcc

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild

      - name: Build Linux
        run: npx electron-builder --linux AppImage deb --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: TurklionLauncher-Linux-AppImage
          path: dist/*.AppImage
          retention-days: 30

      - uses: actions/upload-artifact@v4
        with:
          name: TurklionLauncher-Linux-deb
          path: dist/*.deb
          retention-days: 30

  build-macos:
    name: macOS Build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild

      - name: Build macOS
        run: npx electron-builder --mac dmg --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - uses: actions/upload-artifact@v4
        with:
          name: TurklionLauncher-macOS
          path: dist/*.dmg
          retention-days: 30

  release:
    name: Create Release
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true

      - name: List files
        run: find release-files -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Turklion Launcher ${{ github.ref_name }}"
          body: |
            ## Turklion Launcher ${{ github.ref_name }}

            | Platform | Dosya | Aciklama |
            |----------|-------|----------|
            | Windows | `.exe` | Direkt calistir |
            | Linux | `.AppImage` | `chmod +x` sonra calistir |
            | Linux | `.deb` | `sudo dpkg -i` ile kur |
            | macOS | `.dmg` | Applications klasorune surukle |
          files: release-files/**/*
          draft: false
          prerelease: false
